# ============================================================
# AKB48 公演データ自動更新ワークフロー
# ============================================================
# 【動作】
#   1. 毎日 06:00 UTC (日本時間 15:00) に自動実行
#   2. GitHub 上から手動でも実行可能 (Actions → Update Data → Run workflow)
#   3. AKB48公式APIから最新データを取得
#   4. js/data.js を更新して自動コミット
#   5. GitHub Pages が再デプロイされ、サイトが最新に
#
# 【使い方】
#   - 自動: 設定不要、毎日自動更新
#   - 手動: GitHub リポジトリ → Actions → Update Data → Run workflow
# ============================================================

name: Update Data

on:
  # 定期実行: 毎日 06:00 UTC (日本時間 15:00)
  schedule:
    - cron: '0 6 * * *'

  # 手動実行: GitHub UI からボタン一つで実行可能
  workflow_dispatch:

  # リポジトリへの push 時（data.js 関連以外の変更でも再取得）
  push:
    branches: [main, master]

# 最低限の権限
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 チェックアウト
        uses: actions/checkout@v4

      - name: 🔧 Node.js 設定
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔄 データ取得・生成
        run: node scripts/build-data.js

      - name: 📊 変更確認
        id: diff
        run: |
          if git diff --quiet js/data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "データに変更はありません"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "データが更新されました"
          fi

      - name: 📝 変更をコミット＆プッシュ
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/data.js
          git commit -m "auto: 公演データを更新 ($(date +'%Y/%m/%d'))"
          git push
